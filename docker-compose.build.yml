name: vision-demo

# Same as docker-compose.yml, but BUILDS the image locally from source
# (compiles otc_capture against the Optris SDK and builds the ONNX model)
# instead of pulling the published image from GHCR.
#
#   cp .env.example .env      # pick the Optris SDK version
#   docker compose -f docker-compose.build.yml up --build
#
# Prerequisite: thin-edge.io running on the host, connected to Cumulocity, with
# MQTT (1883) and the Cumulocity HTTP proxy (8001) reachable on localhost.

services:
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Optris Thermal Camera SDK — github.com/Optris/otcsdk_downloads/releases
        OTCSDK_VERSION: ${OTCSDK_VERSION:-11.3.0}
        OTCSDK_UBUNTU: ${OTCSDK_UBUNTU:-24.04}
    image: vision-demo-pipeline:local

    # Host networking so otc_capture can discover/reach the Optris camera over
    # Ethernet (subnet scan + UDP stream), and so the host's thin-edge MQTT
    # broker (1883) and Cumulocity HTTP proxy (8001) are reachable on localhost.
    network_mode: host

    volumes:
      # Edit these on the host — the runner hot-reloads on change every cycle
      # (mirrors pushing config via Cumulocity Configuration Management).
      - ./pipeline/config/pipeline.json:/opt/tedge-pipeline/config/pipeline.json
      - ./pipeline/processors/preprocessor.py:/opt/tedge-pipeline/processors/preprocessor.py
      - ./pipeline/processors/postprocessor.py:/opt/tedge-pipeline/processors/postprocessor.py
      # Optional: override the baked-in model with a locally-built one — it must
      # match frame_width/height + grid_rows/cols in pipeline.json. Build it with
      # pipeline/build_thermal_model.py, then uncomment (the runner hot-reloads):
      # - ./pipeline/model.onnx:/opt/tedge-pipeline/models/model.onnx
      # Persist captured frames and the SDK's per-camera calibration cache.
      - captures:/opt/tedge-pipeline/data/captures
      - optris-calib:/root/.config/optris

    restart: unless-stopped

volumes:
  captures:
  optris-calib:
