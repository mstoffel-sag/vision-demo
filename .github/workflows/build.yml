name: build

# Compiles otc_capture for amd64 and arm64 using the native Optris SDK, and
# builds pipeline/model.onnx from pipeline/build_thermal_model.py.
#
# Each architecture builds natively (GitHub provides both x86_64 and arm64
# Linux runners), installing the matching Optris Thermal Camera SDK .deb from
# the public release assets before compiling. model.onnx is generated at
# build time rather than checked into the repo, so it's always in sync with
# build_thermal_model.py and the frame size/grid below.

on:
  push:
    #branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    # Manual trigger (Actions tab → "build" → "Run workflow", or `gh workflow run build.yml`).
    inputs:
      sdk_version:
        description: "Optris SDK version to build against"
        required: false
        default: "11.3.0"
      ubuntu_release:
        description: "otcsdk Ubuntu build to use"
        required: false
        default: "24.04"
        type: choice
        options: ["24.04", "22.04"]

env:
  # Manual runs use the dispatch inputs; all other triggers fall back to these defaults.
  SDK_VERSION: ${{ github.event.inputs.sdk_version || '11.3.0' }}
  UBUNTU_RELEASE: ${{ github.event.inputs.ubuntu_release || '24.04' }}

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Optris SDK (${{ matrix.arch }})
        run: |
          DEB="otcsdk-${SDK_VERSION}-ubuntu-${UBUNTU_RELEASE}-${{ matrix.arch }}.deb"
          URL="https://github.com/Optris/otcsdk_downloads/releases/download/v${SDK_VERSION}/${DEB}"
          echo "Downloading $URL"
          wget -q "$URL"

      - name: Install SDK and build dependencies
        run: |
          DEB="otcsdk-${SDK_VERSION}-ubuntu-${UBUNTU_RELEASE}-${{ matrix.arch }}.deb"
          sudo apt-get update
          # Installing the .deb pulls in its runtime/build dependencies (libusb, libudev, ...).
          sudo apt-get install -y "./${DEB}" build-essential zlib1g-dev

      - name: Build
        run: ./build.sh

      - name: Verify binary architecture
        run: file ./otc_capture

      - name: Rename for artifact
        run: mv otc_capture "otc_capture-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otc_capture-linux-${{ matrix.arch }}
          path: otc_capture-linux-${{ matrix.arch }}
          if-no-files-found: error

  model:
    name: build model
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install numpy onnxruntime

      - name: Build ONNX model
        # Resolution/grid must match pipeline/config/pipeline.json
        # (frame_width/frame_height, grid_rows/grid_cols) and the Xi410's
        # native 384x240 output. build_thermal_model.py self-validates with
        # onnxruntime when it's installed.
        run: |
          python3 pipeline/build_thermal_model.py \
            --height 240 --width 384 --grid-rows 6 --grid-cols 8 \
            --output model.onnx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model.onnx
          path: model.onnx
          if-no-files-found: error

  release:
    name: release
    needs: [build, model]
    # Only run when a version tag (v*) is pushed.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # required to create the release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/otc_capture-linux-*
            dist/model.onnx
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────────
  # Multi-arch Docker image (capture + ONNX pipeline in one container).
  #
  # Each architecture builds NATIVELY on its own runner and pushes an untagged
  # image by digest; the `docker-manifest` job then stitches the two digests
  # into a single multi-arch tag. This avoids slow QEMU emulation for the C++
  # compile + apt/pip install.
  #
  # Image: ghcr.io/<owner>/<repo>  (e.g. ghcr.io/mstoffel-sag/vision-demo)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: docker image (${{ matrix.arch }})
    # Part of the release: only on version tags (plus manual runs for testing).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            OTCSDK_VERSION=${{ env.SDK_VERSION }}
            OTCSDK_UBUNTU=${{ env.UBUNTU_RELEASE }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker manifest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [docker]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}"
